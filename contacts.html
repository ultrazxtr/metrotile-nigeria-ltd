<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - MetroTile Nigeria Ltd</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-gray-50">
    <!-- Same Navbar as above (copy from index.html) -->

    <div class="max-w-2xl mx-auto px-6 py-20">
        <h1 class="text-4xl font-bold text-center mb-10">Request a Quote</h1>
        
        <form action="https://formsubmit.co/YOUR-EMAIL-HERE@gmail.com" method="POST" class="bg-white p-8 md:p-12 rounded-3xl shadow-xl space-y-6">
            <input type="hidden" name="_subject" value="New Quote Request - MetroTile">
            <input type="hidden" name="_next" value="https://yourdomain.com/thankyou.html">

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block mb-2 font-medium">Full Name *</label>
                    <input type="text" name="name" required class="w-full px-5 py-4 border rounded-2xl focus:border-red-700 outline-none">
                </div>
                <div>
                    <label class="block mb-2 font-medium">Phone Number *</label>
                    <input type="tel" name="phone" required class="w-full px-5 py-4 border rounded-2xl focus:border-red-700 outline-none">
                </div>
            </div>

            <div>
                <label class="block mb-2 font-medium">Email Address *</label>
                <input type="email" name="email" required class="w-full px-5 py-4 border rounded-2xl focus:border-red-700 outline-none">
            </div>

            <div>
                <label class="block mb-2 font-medium">Full Address</label>
                <input type="text" name="address" class="w-full px-5 py-4 border rounded-2xl focus:border-red-700 outline-none" placeholder="Plot 623, Cadastral Zone BO2, Abuja">
            </div>

            <div>
                <label class="block mb-2 font-medium">Project Details</label>
                <textarea name="message" rows="6" class="w-full px-5 py-4 border rounded-3xl focus:border-red-700 outline-none" placeholder="Type of roofing, preferred color, timeline..."></textarea>
            </div>

            <button type="submit" class="w-full bg-red-700 hover:bg-red-800 text-white py-6 rounded-3xl text-xl font-semibold transition">
                Send Quote Request
            </button>
        </form>

        <div class="text-center mt-10">
            <p class="text-2xl font-semibold">0803 363 3964</p>
            <p class="text-gray-600">Plot 623, Cadastral Zone BO2 District, Abuja</p>
        </div>
    </div>

    <!-- WhatsApp Button (same as above) -->
</body>
</html>
